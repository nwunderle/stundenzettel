<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f6e7e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="description" content="Naked without Costume - Stundenzettel">
  <title>Naked without Costume</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', 'DM Sans', sans-serif;
      background: #f6e7e8;
      color: #1c1c1c;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .app { max-width: 520px; margin: 0 auto; padding: 0 16px 80px; }

    /* Header */
    .header { text-align: center; padding: 28px 0 8px; border-bottom: 1px solid #d9bfc1; margin-bottom: 20px; }
    .header h1 { font-size: 28px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; font-family: 'Space Grotesk', sans-serif; color: #1c1c1c; }
    .header .sub { font-size: 13px; color: #4a3a3b; letter-spacing: 0.18em; font-family: 'DM Sans', sans-serif; margin-top: 4px; text-transform: uppercase; }

    /* Nav */
    .nav { display: flex; background: #fdf4f5; border-radius: 10px; overflow: hidden; margin-bottom: 20px; border: 1px solid #d9bfc1; }
    .nav button { flex: 1; padding: 10px 0; border: none; background: transparent; color: #4a3a3b; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .nav button.active { background: #1c1c1c; color: #f6e7e8; font-weight: 700; }

    /* Card */
    .card { background: #fdf4f5; border: 1px solid #d9bfc1; border-radius: 12px; padding: 20px; margin-bottom: 16px; }

    /* Form */
    label.lbl { display: block; font-size: 11px; font-family: 'DM Sans', sans-serif; color: #4a3a3b; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
    .field { margin-bottom: 12px; }
    input[type="date"], input[type="time"], input[type="number"], input[type="text"] {
      width: 100%; padding: 10px 12px; background: #f0dcdd; border: 1px solid #d9bfc1; border-radius: 8px;
      color: #1c1c1c; font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; box-sizing: border-box;
    }
    .row { display: flex; gap: 12px; margin-bottom: 12px; }
    .row > div { flex: 1; }

    /* Buttons */
    .btn { padding: 11px 20px; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: #1c1c1c; color: #f6e7e8; }
    .btn-ghost { background: #f0dcdd; color: #4a3a3b; border: 1px solid #d9bfc1; }
    .btn-danger { background: transparent; color: #8b2e2e; border: 1px solid #8b2e2e; }
    .btn-sm { padding: 7px 14px; font-size: 11px; }
    .btn-xs { padding: 4px 10px; font-size: 11px; }

    /* Timer */
    .timer-display { font-size: 48px; font-weight: 300; color: #1c1c1c; font-family: 'Space Grotesk', sans-serif; text-align: center; letter-spacing: 0.05em; margin: 12px 0; font-variant-numeric: tabular-nums; }
    .timer-label { text-align: center; margin-bottom: 8px; font-size: 11px; font-family: 'DM Sans', sans-serif; color: #4a3a3b; letter-spacing: 0.12em; text-transform: uppercase; }

    /* Badge */
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-family: 'DM Sans', sans-serif; font-weight: 600; background: #1c1c1c18; color: #1c1c1c; letter-spacing: 0.04em; }
    .badge-lg { font-size: 14px; padding: 6px 14px; }

    /* Summary */
    .summary { display: flex; justify-content: space-between; padding: 14px 16px; background: #1c1c1c0d; border-radius: 10px; border: 1px solid #1c1c1c25; margin-bottom: 16px; }
    .summary-val { font-size: 22px; font-weight: 600; color: #1c1c1c; font-family: 'Space Grotesk', sans-serif; }
    .summary-lbl { font-size: 10px; font-family: 'DM Sans', sans-serif; color: #4a3a3b; text-transform: uppercase; letter-spacing: 0.1em; }

    /* Entries */
    .entry-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #d9bfc122; }
    .entry-time { font-family: 'DM Sans', sans-serif; font-size: 14px; }
    .entry-note { font-size: 12px; color: #4a3a3b; font-family: 'DM Sans', sans-serif; margin-top: 2px; }
    .entry-dur { font-family: 'Space Grotesk', sans-serif; font-size: 17px; color: #3a3a3a; font-weight: 600; }
    .entry-del { background: none; border: none; color: #7a6566; cursor: pointer; font-size: 14px; padding: 4px 6px; }
    .dim { color: #4a3a3b; margin-right: 8px; }
    .muted { color: #7a6566; font-size: 12px; margin-left: 6px; }
    .group-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .group-title { font-weight: 600; font-size: 15px; color: #1c1c1c; }

    /* View toggle */
    .view-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .view-bar .spacer { flex: 1; }

    /* Empty */
    .empty { text-align: center; padding: 40px 20px; color: #7a6566; font-style: italic; font-size: 15px; }

    /* Tab content */
    .tab { display: none; }
    .tab.active { display: block; }

    /* Flex helpers */
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .flex-center { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .text-center { text-align: center; }
    .text-right { text-align: right; }
    .mb-14 { margin-bottom: 14px; }

    /* Edit form inline */
    .edit-form { background: #f0dcdd; border: 1px solid #d9bfc1; border-radius: 10px; padding: 14px; margin: 8px 0; }
    .edit-form .row { display: flex; gap: 8px; margin-bottom: 8px; }
    .edit-form .row > div { flex: 1; }
    .edit-form label { display: block; font-size: 10px; font-family: 'DM Sans', sans-serif; color: #4a3a3b; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
    .edit-form input { width: 100%; padding: 7px 8px; background: #fdf4f5; border: 1px solid #d9bfc1; border-radius: 6px; color: #1c1c1c; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; box-sizing: border-box; }
    .edit-form .edit-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }
    .entry-edit { background: none; border: none; color: #7a6566; cursor: pointer; font-size: 13px; padding: 4px 6px; }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Naked without Costume</h1>
      <div class="sub">Stundenzettel</div>
    </header>

    <nav class="nav">
      <button class="active" onclick="switchTab('timer')">⏱ Timer</button>
      <button onclick="switchTab('manual')">✎ Eintrag</button>
      <button onclick="switchTab('overview')">☰ Übersicht</button>
    </nav>

    <!-- TIMER TAB -->
    <div id="tab-timer" class="tab active">
      <div class="card">
        <div class="timer-label" id="timer-status">Timer</div>
        <div class="timer-display" id="timer-display">00:00:00</div>
        <div class="row">
          <div>
            <label class="lbl">Pause (Min)</label>
            <input type="number" id="timer-pause" min="0" value="0">
          </div>
        </div>
        <div class="mb-14">
          <label class="lbl">Notiz</label>
          <input type="text" id="timer-note" placeholder="z.B. Abendvorstellung, Premiere…">
        </div>
        <div class="text-center">
          <button class="btn btn-primary" id="timer-btn" onclick="toggleTimer()">▶ Start</button>
        </div>
      </div>
    </div>

    <!-- MANUAL TAB -->
    <div id="tab-manual" class="tab">
      <div class="card">
        <div class="field">
          <label class="lbl">Datum</label>
          <input type="date" id="manual-date">
        </div>
        <div class="row">
          <div><label class="lbl">Von</label><input type="time" id="manual-from" value="18:00"></div>
          <div><label class="lbl">Bis</label><input type="time" id="manual-to" value="23:00"></div>
          <div><label class="lbl">Pause</label><input type="number" id="manual-pause" min="0" value="0"></div>
        </div>
        <div class="mb-14">
          <label class="lbl">Notiz</label>
          <input type="text" id="manual-note" placeholder="z.B. Matinee, Sonderveranstaltung…">
        </div>
        <div class="flex-between">
          <span class="badge badge-lg" id="manual-dur">5:00 h</span>
          <button class="btn btn-primary" onclick="saveManual()">Speichern</button>
        </div>
      </div>
    </div>

    <!-- OVERVIEW TAB -->
    <div id="tab-overview" class="tab">
      <div class="view-bar">
        <button class="btn btn-primary btn-sm" id="vbtn-day" onclick="setView('day')">Tag</button>
        <button class="btn btn-ghost btn-sm" id="vbtn-week" onclick="setView('week')">Woche</button>
        <button class="btn btn-ghost btn-sm" id="vbtn-month" onclick="setView('month')">Monat</button>
        <div class="spacer"></div>
        <button class="btn btn-ghost btn-sm" onclick="doExport()">↓ CSV</button>
      </div>
      <div id="overview-summary"></div>
      <div id="overview-list"></div>
    </div>
  </div>

  <script>
    // ── State ─────────────────────────────────────────────
    var STORAGE_KEY = "nwc-entries";
    var entries = [];
    var timerRunning = false;
    var timerStart = null;
    var timerInterval = null;
    var timerElapsed = 0;
    var currentTab = "timer";
    var currentView = "day";
    var confirmDelId = null;
    var editId = null;

    // ── Helpers ───────────────────────────────────────────
    function pad(n) { return String(n).padStart(2, "0"); }
    function fmtTime(h, m) { return pad(h) + ":" + pad(m); }
    function isoDate(d) { return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); }
    function todayStr() { return isoDate(new Date()); }
    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

    function diffMin(from, to) {
      var fp = from.split(":").map(Number);
      var tp = to.split(":").map(Number);
      return (tp[0] * 60 + tp[1]) - (fp[0] * 60 + fp[1]);
    }
    function fmtDur(mins) {
      if (mins <= 0) return "0:00";
      return Math.floor(mins / 60) + ":" + pad(mins % 60);
    }
    function fmtDec(mins) { return (mins / 60).toFixed(2); }

    function fmtDateDE(ds) {
      return new Date(ds).toLocaleDateString("de-DE", { weekday: "short", day: "2-digit", month: "2-digit", year: "numeric" });
    }
    function fmtDateShort(ds) {
      return new Date(ds).toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" });
    }
    function getWeek(ds) {
      var d = new Date(ds);
      var jan1 = new Date(d.getFullYear(), 0, 1);
      return Math.ceil((Math.floor((d - jan1) / 86400000) + jan1.getDay() + 1) / 7);
    }

    // ── Storage ───────────────────────────────────────────
    function load() {
      try { var s = localStorage.getItem(STORAGE_KEY); entries = s ? JSON.parse(s) : []; }
      catch(e) { entries = []; }
    }
    function save() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); } catch(e) {}
    }

    // ── Tab Switching ─────────────────────────────────────
    function switchTab(name) {
      currentTab = name;
      document.querySelectorAll(".tab").forEach(function(el) { el.classList.remove("active"); });
      document.getElementById("tab-" + name).classList.add("active");
      document.querySelectorAll(".nav button").forEach(function(btn) { btn.classList.remove("active"); });
      var labels = { timer: 0, manual: 1, overview: 2 };
      document.querySelectorAll(".nav button")[labels[name]].classList.add("active");
      if (name === "overview") renderOverview();
      if (name === "manual") updateManualDur();
    }

    // ── Timer ─────────────────────────────────────────────
    function toggleTimer() {
      if (!timerRunning) {
        timerStart = new Date();
        timerElapsed = 0;
        timerRunning = true;
        document.getElementById("timer-btn").textContent = "■ Stop & Speichern";
        document.getElementById("timer-btn").className = "btn btn-primary";
        document.getElementById("timer-status").textContent = "⏱ Läuft seit " + fmtTime(timerStart.getHours(), timerStart.getMinutes());
        timerInterval = setInterval(function() {
          timerElapsed++;
          var h = Math.floor(timerElapsed / 3600);
          var m = Math.floor((timerElapsed % 3600) / 60);
          var s = timerElapsed % 60;
          document.getElementById("timer-display").textContent = pad(h) + ":" + pad(m) + ":" + pad(s);
        }, 1000);
      } else {
        clearInterval(timerInterval);
        timerRunning = false;
        var end = new Date();
        var p = parseInt(document.getElementById("timer-pause").value) || 0;
        var n = document.getElementById("timer-note").value;
        entries.push({
          id: uid(),
          date: isoDate(timerStart),
          from: fmtTime(timerStart.getHours(), timerStart.getMinutes()),
          to: fmtTime(end.getHours(), end.getMinutes()),
          pause: p,
          note: n
        });
        save();
        document.getElementById("timer-pause").value = "0";
        document.getElementById("timer-note").value = "";
        document.getElementById("timer-display").textContent = "00:00:00";
        document.getElementById("timer-btn").textContent = "▶ Start";
        document.getElementById("timer-status").textContent = "✓ Gespeichert!";
        setTimeout(function() { document.getElementById("timer-status").textContent = "Timer"; }, 1500);
        timerElapsed = 0;
        timerStart = null;
      }
    }

    // ── Manual ────────────────────────────────────────────
    function updateManualDur() {
      var from = document.getElementById("manual-from").value || "18:00";
      var to = document.getElementById("manual-to").value || "23:00";
      var p = parseInt(document.getElementById("manual-pause").value) || 0;
      var dur = diffMin(from, to) - p;
      document.getElementById("manual-dur").textContent = dur > 0 ? fmtDur(dur) + " h" : "–";
    }

    function saveManual() {
      var from = document.getElementById("manual-from").value;
      var to = document.getElementById("manual-to").value;
      var p = parseInt(document.getElementById("manual-pause").value) || 0;
      var dur = diffMin(from, to) - p;
      if (dur <= 0) return;
      entries.push({
        id: uid(),
        date: document.getElementById("manual-date").value,
        from: from,
        to: to,
        pause: p,
        note: document.getElementById("manual-note").value
      });
      save();
      document.getElementById("manual-note").value = "";
      var btn = document.querySelector("#tab-manual .btn-primary");
      btn.textContent = "✓ Gespeichert";
      setTimeout(function() { btn.textContent = "Speichern"; }, 1500);
    }

    // ── Overview ──────────────────────────────────────────
    function setView(v) {
      currentView = v;
      ["day", "week", "month"].forEach(function(k) {
        document.getElementById("vbtn-" + k).className = k === v ? "btn btn-primary btn-sm" : "btn btn-ghost btn-sm";
      });
      renderOverview();
    }

    function renderOverview() {
      var sorted = entries.slice().sort(function(a, b) {
        if (a.date !== b.date) return b.date.localeCompare(a.date);
        return a.from.localeCompare(b.from);
      });

      // Summary
      var sumEl = document.getElementById("overview-summary");
      if (sorted.length > 0) {
        var total = sorted.reduce(function(s, e) { return s + diffMin(e.from, e.to) - (e.pause || 0); }, 0);
        sumEl.innerHTML = '<div class="summary">' +
          '<div><div class="summary-val">' + fmtDur(total) + '</div><div class="summary-lbl">Gesamt (h:mm)</div></div>' +
          '<div class="text-center"><div class="summary-val">' + fmtDec(total) + '</div><div class="summary-lbl">Dezimal</div></div>' +
          '<div class="text-right"><div class="summary-val">' + sorted.length + '</div><div class="summary-lbl">Einträge</div></div>' +
          '</div>';
      } else {
        sumEl.innerHTML = '';
      }

      // Group
      var groups = {};
      var months = ["Jan", "Feb", "Mär", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dez"];
      sorted.forEach(function(e) {
        var key;
        if (currentView === "day") key = e.date;
        else if (currentView === "week") key = e.date.slice(0, 4) + "-KW" + pad(getWeek(e.date));
        else key = e.date.slice(0, 7);
        if (!groups[key]) groups[key] = [];
        groups[key].push(e);
      });

      var listEl = document.getElementById("overview-list");
      var keys = Object.keys(groups);
      if (keys.length === 0) {
        listEl.innerHTML = '<div class="empty">Noch keine Einträge vorhanden.</div>';
        return;
      }

      var html = "";
      keys.forEach(function(key) {
        var items = groups[key];
        var gTotal = items.reduce(function(s, e) { return s + diffMin(e.from, e.to) - (e.pause || 0); }, 0);

        var label;
        if (currentView === "day") label = fmtDateDE(key);
        else if (currentView === "week") label = key.replace("-KW", " · KW ");
        else { var p = key.split("-"); label = months[parseInt(p[1]) - 1] + " " + p[0]; }

        html += '<div class="card" style="padding:16px">';
        html += '<div class="group-header"><span class="group-title">' + label + '</span><span class="badge">' + fmtDur(gTotal) + ' h</span></div>';

        items.forEach(function(e) {
          var dur = diffMin(e.from, e.to) - (e.pause || 0);

          if (editId === e.id) {
            // Inline edit form
            html += '<div class="edit-form">';
            html += '<div class="row">';
            html += '<div><label>Datum</label><input type="date" id="edit-date" value="' + e.date + '"></div>';
            html += '</div>';
            html += '<div class="row">';
            html += '<div><label>Von</label><input type="time" id="edit-from" value="' + e.from + '"></div>';
            html += '<div><label>Bis</label><input type="time" id="edit-to" value="' + e.to + '"></div>';
            html += '<div><label>Pause</label><input type="number" id="edit-pause" min="0" value="' + (e.pause || 0) + '"></div>';
            html += '</div>';
            html += '<div><label>Notiz</label><input type="text" id="edit-note" value="' + (e.note || '').replace(/"/g, '&quot;') + '" placeholder="Optional"></div>';
            html += '<div class="edit-actions">';
            html += '<button class="btn btn-ghost btn-xs" onclick="cancelEdit()">Abbrechen</button>';
            html += '<button class="btn btn-primary btn-xs" onclick="saveEdit(\'' + e.id + '\')">Speichern</button>';
            html += '</div>';
            html += '</div>';
          } else {
            // Normal display
            html += '<div class="entry-row">';
            html += '<div style="cursor:pointer" onclick="startEdit(\'' + e.id + '\')">';
            html += '<div class="entry-time">';
            if (currentView !== "day") html += '<span class="dim">' + fmtDateShort(e.date) + '</span>';
            html += '<span>' + e.from + ' – ' + e.to + '</span>';
            if (e.pause > 0) html += '<span class="muted">(' + e.pause + '′ Pause)</span>';
            html += '</div>';
            if (e.note) html += '<div class="entry-note">' + e.note + '</div>';
            html += '</div>';
            html += '<div class="flex-center">';
            html += '<span class="entry-dur">' + fmtDur(dur) + '</span>';
            html += '<button class="entry-edit" onclick="startEdit(\'' + e.id + '\')" title="Bearbeiten">✎</button>';
            if (confirmDelId === e.id) {
              html += '<button class="btn btn-danger btn-xs" onclick="deleteEntry(\'' + e.id + '\')">Löschen?</button>';
            } else {
              html += '<button class="entry-del" onclick="confirmDel(\'' + e.id + '\')">✕</button>';
            }
            html += '</div></div>';
          }
        });

        html += '</div>';
      });
      listEl.innerHTML = html;
    }

    function confirmDel(id) { confirmDelId = id; editId = null; renderOverview(); }
    function deleteEntry(id) {
      entries = entries.filter(function(e) { return e.id !== id; });
      save();
      confirmDelId = null;
      editId = null;
      renderOverview();
    }

    function startEdit(id) { editId = id; confirmDelId = null; renderOverview(); }
    function cancelEdit() { editId = null; renderOverview(); }
    function saveEdit(id) {
      var entry = entries.find(function(e) { return e.id === id; });
      if (!entry) return;
      entry.date = document.getElementById("edit-date").value;
      entry.from = document.getElementById("edit-from").value;
      entry.to = document.getElementById("edit-to").value;
      entry.pause = parseInt(document.getElementById("edit-pause").value) || 0;
      entry.note = document.getElementById("edit-note").value;
      save();
      editId = null;
      renderOverview();
    }

    // ── CSV Export ─────────────────────────────────────────
    function doExport() {
      if (entries.length === 0) return;
      var sorted = entries.slice().sort(function(a, b) { return a.date.localeCompare(b.date); });
      var header = "Datum;Von;Bis;Pause (min);Dauer (h:mm);Dauer (dezimal);Notiz\n";
      var rows = sorted.map(function(e) {
        var dur = diffMin(e.from, e.to) - (e.pause || 0);
        return e.date + ";" + e.from + ";" + e.to + ";" + (e.pause || 0) + ";" + fmtDur(dur) + ";" + fmtDec(dur) + ";" + (e.note || "").replace(/;/g, ",");
      }).join("\n");
      var blob = new Blob([header + rows], { type: "text/csv;charset=utf-8;" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "Stundenzettel.csv";
      a.click();
      URL.revokeObjectURL(url);
    }

    // ── Init ──────────────────────────────────────────────
    load();
    document.getElementById("manual-date").value = todayStr();
    document.querySelectorAll("#tab-manual input").forEach(function(el) {
      el.addEventListener("input", updateManualDur);
    });
    updateManualDur();
  </script>

  <script>
    if ('serviceWorker' in navigator && location.protocol === 'https:') {
      navigator.serviceWorker.register('sw.js').catch(function() {});
    }
  </script>
</body>
</html>
